{% extends 'common/layouts/main_layout.html' %}
{% block title %}TecW · Registrarse{% endblock %}

{% block content %}

<section class="hero is-primary is-small">
    <div class="hero-body">
        <div class="container">
            <p class="title">Crear cuenta</p>
            <p class="subtitle">Únete a TecW Rocódromo</p>
        </div>
    </div>
</section>

<section class="section">
    <div class="container">
        <div class="columns is-centered">
            <div class="column is-6">

                {% if error %}
                <div class="notification is-danger is-light mb-4">{{ error }}</div>
                {% endif %}

                <div class="box">
                    <form action="/auth/register" method="POST" enctype="multipart/form-data">

                        <div class="field">
                            <label class="label">Nombre completo</label>
                            <div class="control">
                                <input class="input" type="text" name="name"
                                       placeholder="Ej: María López" required autofocus>
                            </div>
                        </div>

                        <div class="field">
                            <label class="label">Email</label>
                            <div class="control">
                                <input class="input" type="email" name="email"
                                       placeholder="tu@email.com" required>
                            </div>
                        </div>

                        <div class="columns">
                            <div class="column">
                                <div class="field">
                                    <label class="label">Contraseña</label>
                                    <div class="control">
                                        <input class="input" type="password" name="password"
                                               placeholder="••••••••" required minlength="8">
                                    </div>
                                </div>
                            </div>
                            <div class="column">
                                <div class="field">
                                    <label class="label">Confirmar contraseña</label>
                                    <div class="control">
                                        <input class="input" type="password" name="password_confirm"
                                               placeholder="••••••••" required minlength="8">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="columns">
                            <div class="column">
                                <div class="field">
                                    <label class="label">Nivel</label>
                                    <div class="control">
                                        <div class="select is-fullwidth">
                                            <select name="level" required>
                                                <option value="">-- Selecciona --</option>
                                                <option>Principiante</option>
                                                <option>Intermedio</option>
                                                <option>Avanzado</option>
                                                <option>Experto</option>
                                            </select>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="column">
                                <div class="field">
                                    <label class="label">Ciudad</label>
                                    <div class="control">
                                        <div class="select is-fullwidth">
                                            <select name="city" required>
                                                <option value="">-- Selecciona --</option>
                                                <option value="Madrid">Madrid</option>
                                                <option value="Barcelona">Barcelona</option>
                                            </select>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="columns">
                            <div class="column">
                                <div class="field">
                                    <label class="label">Fecha de alta</label>
                                    <div class="control">
                                        <input class="input" type="date" name="member_since" required>
                                    </div>
                                </div>
                            </div>
                            <div class="column">
                                <div class="field">
                                    <label class="label">Avatar (emoji)</label>
                                    <div class="control">
                                        <div class="select is-fullwidth">
                                            <select name="avatar">
                                                <option value="🧗">🧗 Escalador</option>
                                                <option value="🏔️">🏔️ Montaña</option>
                                                <option value="🌟">🌟 Estrella</option>
                                                <option value="⛰️">⛰️ Cumbre</option>
                                                <option value="🪨">🪨 Roca</option>
                                                <option value="💪">💪 Fuerza</option>
                                            </select>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="field">
                            <label class="label">Foto <span class="has-text-grey is-size-7">(opcional)</span></label>
                            <div class="control">
                                <input class="input" type="file" name="picture" accept="image/*">
                            </div>
                        </div>

                        <div class="field mt-5">
                            <button class="button is-primary is-fullwidth" type="submit">
                                Crear cuenta
                            </button>
                        </div>

                    </form>
                </div>

                <p class="has-text-centered is-size-7 has-text-grey">
                    ¿Ya tienes cuenta? <a href="/auth/login">Inicia sesión</a>
                </p>

            </div>
        </div>
    </div>
</section>

{% endblock %}
