{% extends 'blocks/layout.html' %}
{% block title %}TecW · Editar {{ block.name }}{% endblock %}

{% block content %}

<section class="hero is-dark is-small">
    <div class="hero-body">
        <div class="container">
            <p class="title">🧱 Editar bloque</p>
            <p class="subtitle">{{ block.name }}</p>
        </div>
    </div>
</section>

<section class="section">
    <div class="container">
        <div class="columns is-centered">
            <div class="column is-6">
                <div class="box">
                    <form action="/blocks/{{ block.id }}/edit" method="POST">

                        <div class="field">
                            <label class="label">Nombre</label>
                            <div class="control">
                                <input class="input" type="text" name="name" value="{{ block.name }}" required>
                            </div>
                        </div>

                        <div class="columns">
                            <div class="column">
                                <div class="field">
                                    <label class="label">Grado (V-scale)</label>
                                    <div class="control">
                                        <div class="select is-fullwidth">
                                            <select name="grade" required>
                                                {% for g in ['V0','V1','V2','V3','V4','V5','V6','V7','V8','V9','V10'] %}
                                                <option {% if block.grade == g %}selected{% endif %}>{{ g }}</option>
                                                {% endfor %}
                                            </select>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="column">
                                <div class="field">
                                    <label class="label">Color de la presa</label>
                                    <div class="control">
                                        <input class="input" type="color" name="color" value="{{ block.color }}" required>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="columns">
                            <div class="column">
                                <div class="field">
                                    <label class="label">Sector</label>
                                    <div class="control">
                                        <input class="input" type="text" name="sector" value="{{ block.sector }}" maxlength="5" required>
                                    </div>
                                </div>
                            </div>
                            <div class="column">
                                <div class="field">
                                    <label class="label">Altura (m)</label>
                                    <div class="control">
                                        <input class="input" type="number" name="height" value="{{ block.height }}" step="0.1" min="1" max="10" required>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="field">
                            <label class="label">Ciudad</label>
                            <div class="control">
                                <div class="select is-fullwidth">
                                    <select name="city" required>
                                        <option value="madrid" {% if block.city == 'madrid' %}selected{% endif %}>Madrid</option>
                                        <option value="barcelona" {% if block.city == 'barcelona' %}selected{% endif %}>Barcelona</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="field">
                            <label class="label">Descripción</label>
                            <div class="control">
                                <textarea class="textarea" name="description" rows="3" required>{{ block.description }}</textarea>
                            </div>
                        </div>

                        <div class="field is-grouped mt-5">
                            <div class="control">
                                <button class="button is-dark" type="submit">Guardar cambios</button>
                            </div>
                            <div class="control">
                                <a class="button is-light" href="/blocks/{{ block.id }}">Cancelar</a>
                            </div>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
</section>

{% endblock %}
